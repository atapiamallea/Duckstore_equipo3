<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckStore Equipo 3</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">
        <nav class="header__nav">
            <div class="header__logo-container">
                <a href="index.html" class="header__logo">
                    <img class="header__logo-img" src="assets/logo.svg" alt="DuckStore Logo">
                </a>
            </div>

            <ul class="header__nav-list">
                <li class="nav__item"><a href="#">Inicio</a></li>
                <li class="nav__item"><a href="#">Catálogo</a></li>
                <li class="nav__item"><a href="#">Contacto</a></li>
            </ul>
        </nav>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__title">
                    <h1>El "Quack" que le <br> faltaba a tu <br> <span>colección</span> </h1>
                    <button class="hero__button">Ver Catálogo</button>
                </div>
                <article class="card__hero">
                    <div class="card__img-container">
                        <img class="hero__card-img" src="assets/unicornio.png" alt="Imagen del hero">
                    </div>
                </article>
    </header>
    <main>
        <section class="categories">
            <h2 class="categories__title">Elige tu categoría favorita</h2>
            <div class="categories__grid">

                <article class="card">
                    <div class="card__image-container--orange">
                        <img src="./assets/cirujano.png" alt="Pato C" class="card__img">
                    </div>
                    <button class="card__button">Ver más</button>
                </article>

                <article class="card">
                    <div class="card__image-container--white">
                        <img src="./assets/batman.png" alt="Pato Batman" class="card__img">
                    </div>
                    <button class="card__button">Ver más</button>
                </article>

                <article class="card">
                    <div class="card__image-container--blue">
                        <img src="./assets/murcielago.png" alt="Pato Murciélago" class="card__img">
                    </div>
                    <button class="card__button">Ver más</button>
                </article>
            </div>
        </section>
    </main>


</body>

</html>
