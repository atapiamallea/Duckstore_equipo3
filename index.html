<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DuckStore Equipo 3</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header">


        <nav class="header__nav">
            <div class="header__logo-container">
                <a href="index.html" class="header__logo">
                    <img class="header__logo-img" src="assets/logo.svg" alt="DuckStore Logo">
                </a>
            </div>

            <ul class="header__nav-list">
                <li class="nav__item"><a href="#">Inicio</a></li>
                <li class="nav__item"><a href="#">Catálogo</a></li>
                <li class="nav__item"><a href="#">Contacto</a></li>
            </ul>
        </nav>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__title">
                    <h1>El "Quack" que le <br> faltaba a tu <br> <span>colección</span> </h1>
                    <button class="hero__button">Ver Catálogo</button>
                </div>
                <article class="card__hero">
                    <div class="card__img-container">
                        <img class="hero__card-img" src="assets/unicornio.png" alt="Imagen del hero">
                    </div>
                </article>

            </div>

        </section>
    </header>

</body>

</html>
