<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duckstore - Catálogo</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <nav class="header__nav">
            <div class="header__logo-container">
                <a href="index.html" class="header__logo">
                    <img class="header__logo-img" src="assets/logo.svg" alt="DuckStore Logo">
                </a>
            </div>

            <button class="menu-toggle" aria-label="Abrir menú">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>

            <ul class="header__nav-list" id="nav-menu">
                <li class="nav__item"><a href="#">Inicio</a></li>
                <li class="nav__item"><a href="#">Catálogo</a></li>
                <li class="nav__item"><a href="#">Contacto</a></li>
            </ul>
        </nav>
        <section class="hero">
            <div class="hero__container">
                <div class="hero__title">
                    <h1>El "Quack" que le <br> faltaba a tu <br> <span>colección</span> </h1>
                    <button class="hero__button">Ver Catálogo</button>
                </div>
                <article class="card__hero">
                    <div class="card__img-container">
                        <img class="hero__card-img" src="assets/unicornio.png" alt="Imagen del hero">
                    </div>
                </article>
    </header>
     <footer class="footer">
        <div class="footer__container">
            <img class="footer__logo-img" src="assets/logo.svg" alt="DuckStore Logo" />
            <p class="footer-text">© 2026 FemCoders Andrea, Nira, Chiara. <br> Made with ❤︎ </br></p>
        </div>
    </footer>
    
</body>
</html>
